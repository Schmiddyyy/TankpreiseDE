<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preis-Animation</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; }
    #map { background: #f5f5f5; }
    .panel {
      position: absolute; top: 12px; right: 12px; z-index: 1000; width: 230px;
      background: #fff; padding: 10px 12px; border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,.3); font: 13px/1.4 system-ui, sans-serif;
    }
    .panel h1 { font-size: 14px; margin: 0 0 6px; }
    nav a { margin-right: 12px; }
    .week { font-size: 18px; font-weight: 700; margin: 6px 0; }
    .controls { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
    button { font: 14px system-ui; padding: 4px 10px; cursor: pointer; }
    input[type=range] { width: 100%; }
    .legend { margin-top: 8px; }
    .legend i { display: inline-block; width: 14px; height: 14px; margin-right: 4px; border-radius: 50%; vertical-align: -2px; }
    .muted { color: #777; font-size: 11px; }
    label.sp { display: block; margin-top: 6px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="panel">
    <h1>Preis-Animation</h1>
    <nav><a href="index.html">← Karte</a><a href="border_stats.html">Grenznähe</a></nav>
    <div class="week" id="week">—</div>
    <div class="controls">
      <button id="play">▶ Play</button>
      <button id="step">⏭</button>
    </div>
    <input type="range" id="slider" min="0" value="0" />
    <label class="sp">Tempo
      <select id="speed">
        <option value="500">langsam</option>
        <option value="250" selected>normal</option>
        <option value="100">schnell</option>
      </select>
    </label>
    <div class="legend" id="legend"></div>
    <div class="muted" id="meta"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { preferCanvas: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19, attribution: '© OpenStreetMap'
    }).addTo(map);

    // FIXED green->red ramp across the whole time range, so rising prices
    // visibly turn the map redder over the animation.
    const RAMP = ['#1a9850', '#66bd63', '#a6d96a', '#fee08b', '#f46d43', '#d73027'];
    let scaleMin = 1, scaleMax = 2;
    function colorFor(milli) {            // milli = price*1000, 0 = no data
      if (!milli) return '#ccc';
      const v = milli / 1000;
      const t = Math.max(0, Math.min(1, (v - scaleMin) / (scaleMax - scaleMin)));
      return RAMP[Math.min(RAMP.length - 1, Math.floor(t * RAMP.length))];
    }

    let DATA, markers = [], frame = 0, timer = null;

    function showFrame(i) {
      frame = i;
      const week = DATA.weeks[i];
      document.getElementById('week').textContent = week;
      document.getElementById('slider').value = i;
      for (let k = 0; k < markers.length; k++) {
        markers[k].setStyle({ fillColor: colorFor(DATA.stations[k].p[i]) });
      }
    }

    function play() {
      const btn = document.getElementById('play');
      if (timer) { clearInterval(timer); timer = null; btn.textContent = '▶ Play'; return; }
      btn.textContent = '⏸ Pause';
      const tick = () => {
        let next = frame + 1;
        if (next >= DATA.weeks.length) next = 0;
        showFrame(next);
      };
      timer = setInterval(tick, +document.getElementById('speed').value);
    }

    fetch('data/weekly.json')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        DATA = data;
        scaleMin = data.scale.min; scaleMax = data.scale.max;
        const b = data.bounds;
        map.fitBounds([[b.south, b.west], [b.north, b.east]]);

        markers = data.stations.map(s => {
          const m = L.circleMarker([s.lat, s.lng], { radius: 4, weight: 0, fillOpacity: 0.85, fillColor: '#ccc' });
          m.bindPopup(`<b>${s.name || 'Tankstelle'}</b>`);
          return m;
        });
        L.layerGroup(markers).addTo(map);

        const slider = document.getElementById('slider');
        slider.max = data.weeks.length - 1;
        slider.addEventListener('input', e => {
          if (timer) play();               // pause when scrubbing
          showFrame(+e.target.value);
        });
        document.getElementById('play').addEventListener('click', play);
        document.getElementById('step').addEventListener('click', () =>
          showFrame((frame + 1) % data.weeks.length));
        document.getElementById('speed').addEventListener('change', () => { if (timer) { play(); play(); } });

        // Fixed legend from the global scale.
        const lo = data.scale.min, hi = data.scale.max, step = (hi - lo) / RAMP.length;
        document.getElementById('legend').innerHTML = RAMP.map((c, i) =>
          `<div><i style="background:${c}"></i>${(lo + i * step).toFixed(2)}–${(lo + (i + 1) * step).toFixed(2)} €</div>`
        ).join('') + `<div><i style="background:#ccc"></i>keine Daten</div>`;
        document.getElementById('meta').textContent =
          `${data.fuel.toUpperCase()} · ${data.stations.length.toLocaleString('de')} Stationen · ` +
          `${data.weeks.length} Wochen`;

        showFrame(0);
      })
      .catch(err => {
        document.getElementById('meta').textContent =
          'data/weekly.json fehlt (' + err.message + '). Erst `python3 scripts/weekly_series.py` ausführen.';
      });
  </script>
</body>
</html>
